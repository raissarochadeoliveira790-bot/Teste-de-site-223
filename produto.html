<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

img{
    width:100%;
    height:300px;
    object-fit:contain;
}

h1{
    color:#0066ff;
    margin:15px 0;
}

p{
    color:#555;
    line-height:1.6;
}

.preco{
    font-size:28px;
    font-weight:bold;
    color:#00a651;
    margin:15px 0;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00a651;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="produtoBox">
    <h1>Produto</h1>
</div>

<script>
const produtos = {
    "lava-roupas": {
        nome: "Deoline Lava-Roupas 5L",
        img: "deoline-lava-roupas-5l.jpg",
        desc: "Alto poder de remoção de sujeira. Não agride tecidos e possui fórmula concentrada.",
        preco: "R$ 51,00"
    },
    "lava-loucas": {
        nome: "Lava-Louças Glicerinado 500ml",
        img: "deoline-lava-loucas-500ml.jpg",
        desc: "Remove gorduras com suavidade e eficiência.",
        preco: "R$ 3,00"
    },
    "alvejante": {
        nome: "Alvejante sem cloro 5L",
        img: "alvejantedeoline.png",
        desc: "Remove sujeiras sem danificar tecidos e cores.",
        preco: "R$ 40,00"
    },
    "limpa-inox": {
        nome: "Limpa inox 750ml",
        img: "deoline-limpainox.png",
        desc: "Limpeza e brilho para superfícies inox.",
        preco: "R$ 12,80"
    },
    "limpa-aluminio": {
        nome: "Limpa alumínio 750ml",
        img: "deoline-limpaaluminio.png",
        desc: "Brilho e limpeza profunda em alumínio.",
        preco: "R$ 8,00"
    },
    "limpa-rejunte": {
        nome: "Limpa rejunte 500ml",
        img: "limparejunte.png",
        desc: "Remove mofos e gorduras facilmente.",
        preco: "R$ 11,85"
    }
};

const url = new URL(window.location.href);
const prod = url.searchParams.get("prod");

const p = produtos[prod];

if(p){
    document.getElementById("produtoBox").innerHTML = `
        <img src="${p.img}">
        <h1>${p.nome}</h1>
        <p>${p.desc}</p>
        <div class="preco">${p.preco}</div>
        <button class="btn" onclick="window.close()">Fechar aba</button>
    `;
}else{
    document.getElementById("produtoBox").innerHTML = `
        <h1>Produto não encontrado</h1>
    `;
}
</script>

</body>
</html>
