<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

img{
    width:100%;
    height:300px;
    object-fit:contain;
}

h1{
    color:#0066ff;
    margin:15px 0;
}

p{
    color:#555;
    line-height:1.6;
}

.preco{
    font-size:28px;
    font-weight:bold;
    color:#00a651;
    margin:15px 0;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00a651;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="produtoBox">
    <h1>Produto</h1>
</div>

<script>
const produtos = {
    "lava-roupas": {
        nome: "Deoline Lava-Roupas 5L",
        img: "deoline-lava-roupas-5l.jpg",
        desc: "O Deoline Lava-Roupas Líquido Concentrado tem um alto poder de remoção da sujeira em suas roupas.

Especialmente desenvolvido para dar maior praticidade e economia na lavagem das roupas, seja à mão ou na máquina. Não agride os tecidos, deixando suas roupas limpas e agradavelmente perfumadas.

Para um limpeza perfeita e com muito mais perfume use-o associado ao Deoline Amaciante de sua preferência.",
        preco: "R$ 51,00"
    },
    "lava-loucas": {
        nome: "Lava-Louças Glicerinado 500ml",
        img: "deoline-lava-loucas-500ml.jpg",
        desc: "O Deoline Lava-Louças Glicerinado – Neutro apresenta uma formulação cuidadosamente balanceada e com glicerina, destinada à remoção de gorduras em louças, talheres e panelas. A praticidade e economia em uma embalagem na medida do seu consumo!",
        preco: "R$ 3,00"
    },
    "alvejante": {
        nome: "Alvejante sem cloro 5L",
        img: "alvejantedeoline.png",
        desc: "O Deoline Alvejante Sem Cloro deixa suas roupas limpas e não danifica os tecidos e as cores. Indicado para roupas brancas e coloridas, deixa sua lavagem mais segura e eficaz trazendo um excelente custo benefício. Use na pré-Lavagem, na lavagem à mão ou na lavagem à máquina. Tem como ativo o peróxido de hidrogênio, produto testado contra os seguintes microrganismos: Staphylococcus aureus e Salmonella Choleraesuis. Para um limpeza perfeita e muito mais perfume use-o associado ao Deoline Lava-roupas Concentrado e ao Deoline Amaciante de sua preferência..",
        preco: "R$ 40,00"
    },
    "limpa-inox": {
        nome: "Limpa inox 750ml",
        img: "deoline-limpainox.png",
        desc: "O Deoline Limpa Inox é ideal para limpeza de superfícies e utensílios em inox, como: Panelas, talheres, bandejas, bancadas, geladeiras, fornos e coifas. Além de possuir excelente ação desincrustante e abrilhantadora, facilita a limpeza pois age de maneira eficaz e com pouco esforço necessário..",
        preco: "R$ 12,80"
    },
    "limpa-aluminio": {
        nome: "Limpa alumínio 750ml",
        img: "deoline-limpaaluminio.png",
        desc: "O Deoline Limpa Alumínio – Pronto Uso é ideal para limpeza de superfícies de alumínio em utensílios de cozinha em geral. Além de possuir excelente ação desincrustante e abrilhantador. Facilita a limpeza pois age de maneira rápida, eficaz e ainda remove manchas, resultando em um acabamento perfeito ao alumínio. Indicado para uso em cozinhas industriais e domésticas..",
        preco: "R$ 8,00"
    },
    "limpa-rejunte": {
        nome: "Limpa rejunte 500ml",
        img: "limparejunte.png",
        desc: "O Deoline Limpa Rejunte é eficaz na limpeza de rejuntes sujos. O produto remove mofos e gorduras e não agride superfícies próximas. Por escorrer pouco, é ideal para a limpeza de superfícies verticais. Indicado na limpeza de todos os tipos de rejuntes, inclusive de rejuntes selados ou coloridos.",
        preco: "R$ 11,85"
    }
};

const url = new URL(window.location.href);
const prod = url.searchParams.get("prod");

const p = produtos[prod];

if(p){
    document.getElementById("produtoBox").innerHTML = `
        <img src="${p.img}">
        <h1>${p.nome}</h1>
        <p>${p.desc}</p>
        <div class="preco">${p.preco}</div>
        <button class="btn" onclick="window.close()">Fechar aba</button>
    `;
}else{
    document.getElementById("produtoBox").innerHTML = `
        <h1>Produto não encontrado</h1>
    `;
}
</script>

</body>
</html>
