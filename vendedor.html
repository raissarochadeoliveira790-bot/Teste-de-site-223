<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}

.pedido{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.item{
display:flex;
gap:10px;
align-items:center;
margin:8px 0;
}

.item img{
width:60px;
height:60px;
object-fit:contain;
background:#eee;
}

button{
padding:6px;
margin:3px;
}
</style>
</head>

<body>

<h1>📦 Pedidos em Tempo Real</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU.firebaseapp.com",
  databaseURL: "https://SEU.firebaseio.com",
  projectId: "SEU_PROJECT",
  appId: "SEU_APP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"pedidos"),(snap)=>{

let data = snap.val();

if(!data){
document.getElementById("pedidos").innerHTML="Sem pedidos";
return;
}

let pedidos = Object.entries(data).map(([id,v])=>({idFirebase:id,...v}));

pedidos.sort((a,b)=>b.id-a.id);

let html="";

pedidos.forEach(p=>{

html+=`
<div class="pedido">
<h3>Pedido ${p.id}</h3>
<strong>${p.status}</strong>

<div>
<button onclick="status('${p.idFirebase}','Pendente')">Pendente</button>
<button onclick="status('${p.idFirebase}','Preparando')">Preparando</button>
<button onclick="status('${p.idFirebase}','Enviado')">Enviado</button>
<button onclick="status('${p.idFirebase}','Entregue')">Entregue</button>
</div>

<hr>

${p.itens.map(i=>`
<div class="item">
<img src="${i.img}">
<div>${i.nome} ${i.qtd}x</div>
</div>
`).join("")}

<h4>Total: R$ ${p.total}</h4>
</div>
`;
});

document.getElementById("pedidos").innerHTML=html;

});

window.status=function(id,status){

update(ref(db,"pedidos/"+id),{status});

}

</script>

</body>
</html>
