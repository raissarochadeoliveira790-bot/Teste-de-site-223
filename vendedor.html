<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Vendedor</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}

h2{margin-top:30px;}

.pedido{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.pendente{border-left:10px solid #ffc107;}
.preparando{border-left:10px solid #17a2b8;}
.enviado{border-left:10px solid #007bff;}
.entregue{border-left:10px solid #28a745;}

.item{
display:flex;
gap:10px;
align-items:center;
margin:5px 0;
}

.item img{
width:50px;
height:50px;
object-fit:contain;
}

button{
margin:3px;
padding:6px;
cursor:pointer;
}

.acoes{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:5px;
}

.secao{
margin-bottom:40px;
}
</style>
</head>

<body>

<h1>📦 Painel de Pedidos</h1>

<div class="secao">
<h2>🟡 Pedidos Ativos</h2>
<div id="ativos"></div>
</div>

<div class="secao">
<h2>📁 Entregues (por data)</h2>
<div id="entregues"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
  authDomain: "vendedor-html.firebaseapp.com",
  databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
  projectId: "vendedor-html",
  storageBucket: "vendedor-html.firebasestorage.app",
  messagingSenderId: "649120787576",
  appId: "1:649120787576:web:7967250e4f0175b5d9518d",
  measurementId: "G-R3BQKGNRQ6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"pedidos"), (snap)=>{

let data = snap.val();

if(!data){
document.getElementById("ativos").innerHTML = "Sem pedidos";
document.getElementById("entregues").innerHTML = "Sem entregues";
return;
}

let pedidos = Object.entries(data)
.map(([id,v])=>({idFirebase:id,...v}))
.reverse();

let ativosHTML = "";
let entregues = {};

pedidos.forEach(p=>{

// ----------------- ENTREGUE -----------------
if(p.status === "Entregue"){

let data = new Date(p.createdAt || Date.now());
let dia = data.toLocaleDateString("pt-BR");

if(!entregues[dia]) entregues[dia] = [];

entregues[dia].push(p);

return;
}

// ----------------- ATIVOS -----------------
let classe = p.status?.toLowerCase() || "pendente";

ativosHTML += `
<div class="pedido ${classe}">

<h3>Pedido ${p.id || ""}</h3>

<h3 style="
display:inline-block;
padding:8px 12px;
border-radius:6px;
color:white;
background:
${p.status==='Pendente' ? '#ffc107' :
p.status==='Preparando' ? '#17a2b8' :
p.status==='Enviado' ? '#007bff' :
'#28a745'};
">
${p.status || "Pendente"}
</h3>

<p><strong>Cliente:</strong> ${p.nome || "Não informado"}</p>
<p><strong>Telefone:</strong> ${p.telefone || "Não informado"}</p>
<p><strong>Endereço:</strong> ${p.endereco || "Não informado"}</p>

<div class="acoes">

<button onclick="alterarStatus('${p.idFirebase}','Pendente')">Pendente</button>
<button onclick="alterarStatus('${p.idFirebase}','Preparando')">Preparando</button>
<button onclick="alterarStatus('${p.idFirebase}','Enviado')">Enviado</button>
<button onclick="alterarStatus('${p.idFirebase}','Entregue')">Entregue</button>

<button onclick="excluirPedido('${p.idFirebase}')" style="background:red;color:#fff;">Excluir</button>

</div>

<hr>

${(p.itens || []).map(i=>`
<div class="item">
<img src="${i.img}">
<div>
<strong>${i.nome}</strong><br>
Qtd: ${i.qtd}
</div>
</div>
`).join("")}

<h4>Total: R$ ${Number(p.total || 0).toFixed(2)}</h4>

</div>
`;
});

// ----------------- ENTREGUES POR DATA -----------------
let entreguesHTML = "";

Object.keys(entregues).sort((a,b)=> new Date(b) - new Date(a)).forEach(data=>{

entreguesHTML += `<h3>📅 ${data}</h3>`;

entregues[data].forEach(p=>{
entreguesHTML += `
<div class="pedido entregue">

<h3>Pedido ${p.id || ""}</h3>

<p><strong>Cliente:</strong> ${p.nome || "Não informado"}</p>
<p><strong>Total:</strong> R$ ${Number(p.total || 0).toFixed(2)}</p>

<button onclick="excluirPedido('${p.idFirebase}')" style="background:red;color:#fff;">Excluir</button>

</div>
`;
});

});

document.getElementById("ativos").innerHTML = ativosHTML;
document.getElementById("entregues").innerHTML = entreguesHTML;

});

function alterarStatus(id, status){
  update(ref(db,"pedidos/"+id),{
    status: status,
    deliveredAt: status==="Entregue" ? Date.now() : null
  });
}

function excluirPedido(id){
  if(confirm("Excluir pedido?")){
    remove(ref(db,"pedidos/"+id));
  }
}

window.alterarStatus = alterarStatus;
window.excluirPedido = excluirPedido;

</script>

</body>
</html>
