<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Vendedor - Xaréu</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
    color:#0066ff;
}

.pedido{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.item{
    padding:5px 0;
    border-bottom:1px solid #eee;
}

.status{
    font-weight:bold;
    margin-top:5px;
    display:block;
}

button{
    margin-top:8px;
    margin-right:5px;
    padding:8px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.enviar{ background:#ff9800; color:#fff; }
.entregar{ background:#4caf50; color:#fff; }
.remover{ background:#f44336; color:#fff; }

</style>

</head>

<body>

<h1>📦 Pedidos Recebidos</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    update,
    remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDVDnZ-GWHE8_4gLd4zRPTJGuwIMsyIKQ",
    authDomain: "vendedor-html.firebaseapp.com",
    databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
    projectId: "vendedor-html",
    storageBucket: "vendedor-html.firebasestorage.app",
    messagingSenderId: "649120787576",
    appId: "1:649120787576:web:7967250e4f0175b5d9518d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const pedidosRef = ref(db, "pedidos");

// ====== LISTAR PEDIDOS ======
onValue(pedidosRef, (snapshot) => {

    const dados = snapshot.val();
    const container = document.getElementById("pedidos");

    if (!dados) {
        container.innerHTML = "<p>Nenhum pedido encontrado.</p>";
        return;
    }

    let html = "";

    Object.keys(dados).reverse().forEach(id => {

        const pedido = dados[id];

        html += `
        <div class="pedido">
            <h3>Cliente: ${pedido.cliente}</h3>

            <p><strong>Telefone:</strong> ${pedido.telefone}</p>
            <p><strong>Endereço:</strong> ${pedido.endereco}</p>

            <span class="status">Status: ${pedido.status}</span>

            <h4>Itens:</h4>
        `;

        if (pedido.itens) {
            pedido.itens.forEach(item => {
                html += `
                <div class="item">
                    ${item.nome} - R$ ${Number(item.preco).toFixed(2)}
                </div>
                `;
            });
        }

        html += `
            <button class="enviar" onclick="marcarEnviado('${id}')">
                Marcar como Enviado
            </button>

            <button class="entregar" onclick="marcarEntregue('${id}')">
                Marcar como Entregue
            </button>

            <button class="remover" onclick="removerPedido('${id}')">
                Remover
            </button>

        </div>`;
    });

    container.innerHTML = html;
});

// ====== FUNÇÕES ======
window.marcarEnviado = async (id) => {
    await update(ref(db, "pedidos/" + id), {
        status: "Enviado"
    });
};

window.marcarEntregue = async (id) => {
    await update(ref(db, "pedidos/" + id), {
        status: "Entregue"
    });
};

window.removerPedido = async (id) => {
    await remove(ref(db, "pedidos/" + id));
};

</script>

</body>
</html>
