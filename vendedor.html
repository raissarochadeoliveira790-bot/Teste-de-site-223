<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Vendedor</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}

.pedido{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}
  .pendente{
    border-left:10px solid #ffc107;
}

.preparando{
    border-left:10px solid #17a2b8;
}

.enviado{
    border-left:10px solid #007bff;
}

.entregue{
    border-left:10px solid #28a745;
}

.item{
display:flex;
gap:10px;
align-items:center;
margin:5px 0;
}

.item img{
width:50px;
height:50px;
object-fit:contain;
}

button{
margin:3px;
padding:6px;
}
</style>
</head>

<body>

<h1>📦 Pedidos</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
  authDomain: "vendedor-html.firebaseapp.com",
  databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
  projectId: "vendedor-html",
  storageBucket: "vendedor-html.firebasestorage.app",
  messagingSenderId: "649120787576",
  appId: "1:649120787576:web:7967250e4f0175b5d9518d",
  measurementId: "G-R3BQKGNRQ6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"pedidos"), (snap)=>{

let data = snap.val();

if(!data){
document.getElementById("pedidos").innerHTML = "Sem pedidos";
return;
}

let pedidos = Object.entries(data)
.map(([id,v])=>({idFirebase:id,...v}))
.reverse();

let html="";

pedidos.forEach(p=>{

let classe = "pendente";

if(p.status === "Preparando"){
    classe = "preparando";
}
else if(p.status === "Enviado"){
    classe = "enviado";
}
else if(p.status === "Entregue"){
    classe = "entregue";
}

html += `
<div class="pedido ${classe}">

<h3>Pedido ${p.id}</h3>

<h3 style="
display:inline-block;
padding:8px 12px;
border-radius:6px;
color:white;
background:
${p.status==='Pendente' ? '#ffc107' :
p.status==='Preparando' ? '#17a2b8' :
p.status==='Enviado' ? '#007bff' :
'#28a745'};
">
${p.status}
</h3>

<p><strong>Cliente:</strong> ${p.nome || "Não informado"}</p>

<p><strong>Telefone:</strong> ${p.telefone || "Não informado"}</p>

<p><strong>CEP:</strong> ${p.cep || "Não informado"}</p>

<p><strong>Endereço:</strong> ${p.endereco || "Não informado"}</p>

<p><strong>Pagamento:</strong> ${p.pagamento || "Não informado"}</p>

<div>

<button
style="background:#ffc107;border:none;border-radius:5px;color:#000;"
onclick="status('${p.idFirebase}','Pendente')">
Pendente
</button>

<button
style="background:#17a2b8;border:none;border-radius:5px;color:#fff;"
onclick="status('${p.idFirebase}','Preparando')">
Preparando
</button>

<button
style="background:#007bff;border:none;border-radius:5px;color:#fff;"
onclick="status('${p.idFirebase}','Enviado')">
Enviado
</button>

<button
style="background:#28a745;border:none;border-radius:5px;color:#fff;"
onclick="status('${p.idFirebase}','Entregue')">
Entregue
</button>

</div>

<hr>

${(p.itens || []).map(i=>`
<div class="item">
<img src="${i.img}">
<div>
<strong>${i.nome}</strong><br>
Quantidade: ${i.qtd}
</div>
</div>
`).join("")}

<hr>

<h4>Total: R$ ${Number(p.total || 0).toFixed(2)}</h4>

</div>
`;
});

document.getElementById("pedidos").innerHTML = html;

});

window.status = function(id,status){
update(ref(db,"pedidos/"+id),{status});
}

</script>

</body>
</html>
