<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel do Vendedor</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.pedido{
    background:#fff;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.item{
    display:flex;
    gap:10px;
    align-items:center;
    margin:8px 0;
}

.item img{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:6px;
    background:#eee;
}

.status{
    padding:5px;
    margin-top:10px;
}

button{
    padding:6px 10px;
    margin:3px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📦 Painel de Pedidos</h1>

<div id="pedidos"></div>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function salvar(){
    localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

function mudarStatus(id, status){
    let pedido = pedidos.find(p => p.id === id);
    pedido.status = status;
    salvar();
    render();
}

function render(){

    let html = "";

    pedidos.forEach(p=>{

        html += `
        <div class="pedido">
            <h3>Pedido #${p.id}</h3>
            <strong>Status: ${p.status}</strong>

            <div class="status">
                <button onclick="mudarStatus(${p.id},'Pendente')">Pendente</button>
                <button onclick="mudarStatus(${p.id},'Preparando')">Preparando</button>
                <button onclick="mudarStatus(${p.id},'Enviado')">Enviado</button>
                <button onclick="mudarStatus(${p.id},'Entregue')">Entregue</button>
            </div>

            <hr>

            ${p.itens.map(i=>`
                <div class="item">
                    <img src="${i.img}">
                    <div>
                        <div><strong>${i.nome}</strong></div>
                        <div>${i.qtd}x R$ ${i.preco}</div>
                    </div>
                </div>
            `).join("")}

            <h4>Total: R$ ${p.total.toFixed(2)}</h4>
        </div>
        `;
    });

    document.getElementById("pedidos").innerHTML = html;
}

render();

</script>

</body>
</html>
