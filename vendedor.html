<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Vendedor - Xaréu</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#0066ff;
}

#pedidos{
    max-width:1000px;
    margin:auto;
}

.pedido{
    background:#fff;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.cliente{
    font-size:22px;
    font-weight:bold;
}

.info{
    margin-top:8px;
    color:#555;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.total{
    margin-top:10px;
    font-size:20px;
    color:#0066ff;
    font-weight:bold;
}

.status{
    margin-top:10px;
    font-weight:bold;
    color:#ff9900;
}

</style>

</head>

<body>

<h1>📦 Pedidos Recebidos</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

 apiKey: "AIzaSyDVDnZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",

 authDomain: "vendedor-html.firebaseapp.com",

 projectId: "vendedor-html",

 storageBucket: "vendedor-html.firebasestorage.app",

 messagingSenderId: "649120787576",

 appId: "1:649120787576:web:7967250e4f0175b5d9518d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const pedidosDiv =
document.getElementById("pedidos");

onSnapshot(
    collection(db,"pedidos"),

    (snapshot)=>{

        let html = "";

        snapshot.forEach((doc)=>{

            const pedido = doc.data();

            let total = 0;

            pedido.itens.forEach(item=>{
                total += Number(item.preco);
            });

            html += `

            <div class="pedido">

                <div class="cliente">
                    ${pedido.cliente}
                </div>

                <div class="info">
                    📞 ${pedido.telefone}
                </div>

                <div class="info">
                    📍 ${pedido.endereco}
                </div>

                <div class="status">
                    ${pedido.status}
                </div>

                <hr>

                ${pedido.itens.map(item => `
                    <div class="item">
                        <span>${item.nome}</span>
                        <span>R$ ${item.preco}</span>
                    </div>
                `).join('')}

                <div class="total">
                    Total: R$ ${total.toFixed(2)}
                </div>

            </div>

            `;
        });

        pedidosDiv.innerHTML = html;
    }
);

</script>

</body>
</html>
