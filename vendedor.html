<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Kanban Pedidos</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{text-align:center;}

.board{
display:flex;
gap:10px;
overflow-x:auto;
}

.coluna{
background:#e9e9e9;
min-width:300px;
padding:10px;
border-radius:10px;
height:80vh;
overflow-y:auto;
}

.coluna h2{text-align:center;}

.pedido{
background:#fff;
padding:10px;
margin:10px 0;
border-radius:8px;
font-size:12px;
}

.pendente{border-left:8px solid #ffc107;}
.preparando{border-left:8px solid #17a2b8;}
.enviado{border-left:8px solid #007bff;}
.entregue{border-left:8px solid #28a745;}

.item{
display:flex;
gap:8px;
align-items:center;
margin:5px 0;
}

.item img{
width:40px;
height:40px;
object-fit:cover;
border-radius:5px;
}

button{
margin:3px;
padding:5px;
cursor:pointer;
font-size:11px;
}

.entregues-area{
margin-top:40px;
background:#fff;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>📦 Painel Kanban de Pedidos</h1>

<div class="board">

<div class="coluna" id="pendente"><h2>🟡 Pendente</h2></div>
<div class="coluna" id="preparando"><h2>🔵 Preparando</h2></div>
<div class="coluna" id="enviado"><h2>🔵 Enviado</h2></div>
<div class="coluna" id="entregue"><h2>🟢 Entregue</h2></div>

</div>

<div class="entregues-area">
<h2>📁 Entregues por Data</h2>
<div id="historico"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
authDomain: "vendedor-html.firebaseapp.com",
databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
projectId: "vendedor-html",
storageBucket: "vendedor-html.firebasestorage.app",
messagingSenderId: "649120787576",
appId: "1:649120787576:web:7967250e4f0175b5d9518d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"pedidos"), (snap)=>{

let data = snap.val();
if(!data) return;

let pedidos = Object.entries(data)
.map(([id,v])=>({idFirebase:id,...v}));

["pendente","preparando","enviado","entregue"].forEach(id=>{
document.getElementById(id).innerHTML = `<h2>${document.querySelector('#'+id+' h2')?.innerText}</h2>`;
});

let entreguesPorData = {};

pedidos.forEach(p=>{

let status = (p.status || "Pendente").toLowerCase();

let itensHTML = (p.itens || []).map(i=>`
<div class="item">
<img src="${i.img}">
<div>
<strong>${i.nome}</strong><br>
Qtd: ${i.qtd}
</div>
</div>
`).join("");

let clienteHTML = `
<strong>Cliente:</strong> ${p.nome || "Não informado"}<br>
<strong>Telefone:</strong> ${p.telefone || "Não informado"}<br>
<strong>CEP:</strong> ${p.cep || "Não informado"}<br>
<strong>Endereço:</strong> ${p.endereco || "Não informado"}<br>
<strong>Pagamento:</strong> ${p.pagamento || "Não informado"}<br>
`;

let html = `
<div class="pedido ${status}">

<strong>Pedido ${p.id || ""}</strong><br>

<hr>

${clienteHTML}

<hr>

${itensHTML}

<hr>

<strong>Total:</strong> R$ ${Number(p.total||0).toFixed(2)}<br>

<div>

<button onclick="mudar('${p.idFirebase}','Pendente')">Pendente</button>
<button onclick="mudar('${p.idFirebase}','Preparando')">Preparando</button>
<button onclick="mudar('${p.idFirebase}','Enviado')">Enviado</button>
<button onclick="mudar('${p.idFirebase}','Entregue')">Entregue</button>

<button onclick="imprimir(this)">🖨️ Imprimir</button>

</div>

</div>
`;

if(status === "entregue"){

let d = new Date(p.createdAt || Date.now()).toLocaleDateString("pt-BR");

if(!entreguesPorData[d]) entreguesPorData[d] = [];
entreguesPorData[d].push(html);

document.getElementById("entregue").innerHTML += html;

}else{
document.getElementById(status).innerHTML += html;
}

});

let hist = "";

Object.keys(entreguesPorData)
.sort((a,b)=>new Date(b)-new Date(a))
.forEach(data=>{
hist += `<h3>📅 ${data}</h3>`;
entreguesPorData[data].forEach(p=>{
hist += p;
});
});

document.getElementById("historico").innerHTML = hist;

});

function mudar(id,status){
update(ref(db,"pedidos/"+id),{
status:status,
deliveredAt: status==="Entregue" ? Date.now() : null
});
}

function imprimir(btn){
let pedido = btn.closest(".pedido");

let w = window.open("", "_blank");

w.document.write(`
<html>
<head>
<title>Imprimir Pedido</title>
<style>
body{font-family:Arial;padding:20px;}
.pedido{border:1px solid #000;padding:15px;border-radius:10px;}
.item{display:flex;gap:10px;margin:5px 0;}
.item img{width:50px;height:50px;object-fit:cover;}
</style>
</head>

<body onload="window.print(); window.close();">
<div class="pedido">
${pedido.innerHTML}
</div>
</body>
</html>
`);

w.document.close();
}

window.mudar = mudar;
window.imprimir = imprimir;

</script>

</body>
</html>
