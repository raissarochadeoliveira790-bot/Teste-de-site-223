<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel do Vendedor</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
}

.pedido{
    background:#fff;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.item{
    display:flex;
    gap:10px;
    align-items:center;
    margin:8px 0;
}

.item img{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:6px;
    background:#eee;
}

button{
    padding:6px 10px;
    margin:3px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📦 Painel de Pedidos</h1>

<button onclick="render()">🔄 Atualizar</button>
<button onclick="limpar()">🗑 Limpar Tudo</button>

<div id="pedidos"></div>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function salvar(){
    localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

function mudarStatus(id, status){

    let pedido = pedidos.find(p => p.id === id);

    if(!pedido) return;

    pedido.status = status;

    salvar();
    render();
}

function limpar(){
    if(confirm("Apagar todos os pedidos?")){
        localStorage.removeItem("pedidos");
        pedidos = [];
        render();
    }
}

function render(){

    pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    if(pedidos.length === 0){
        document.getElementById("pedidos").innerHTML =
        "<p>Nenhum pedido encontrado.</p>";
        return;
    }

    let html = "";

    pedidos.forEach(p=>{

        html += `
        <div class="pedido">
            <h3>Pedido #${p.id}</h3>
            <strong>Status: ${p.status || "Pendente"}</strong>

            <div>
                <button onclick="mudarStatus(${p.id},'Pendente')">Pendente</button>
                <button onclick="mudarStatus(${p.id},'Preparando')">Preparando</button>
                <button onclick="mudarStatus(${p.id},'Enviado')">Enviado</button>
                <button onclick="mudarStatus(${p.id},'Entregue')">Entregue</button>
            </div>

            <hr>

            ${(p.itens || []).map(i=>`
                <div class="item">
                    <img src="${i.img || ''}">
                    <div>
                        <strong>${i.nome}</strong><br>
                        ${i.qtd}x R$ ${i.preco}
                    </div>
                </div>
            `).join("")}

            <h4>Total: R$ ${(p.total || 0).toFixed(2)}</h4>
        </div>
        `;
    });

    document.getElementById("pedidos").innerHTML = html;
}

render();

</script>

</body>
</html>
