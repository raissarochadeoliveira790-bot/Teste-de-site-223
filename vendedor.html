<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel do Vendedor</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.pedido{background:#fff;padding:15px;margin:10px 0;border-radius:10px;}
</style>
</head>

<body>

<h1>📦 Pedidos</h1>
<div id="pedidos"></div>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

document.getElementById("pedidos").innerHTML =
pedidos.map((p,i)=>`
<div class="pedido">
<h3>Pedido ${i+1}</h3>
<pre>${p}</pre>
</div>
`).join("");
</script>

</body>
</html>
