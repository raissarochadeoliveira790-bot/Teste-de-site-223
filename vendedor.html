<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Vendedor - Xaréu</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
    color:#0066ff;
}

.pedido{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.pedido h3{
    margin-bottom:10px;
}

.item{
    padding:5px 0;
    border-bottom:1px solid #eee;
}

.status{
    color:#00a651;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>📦 Pedidos Recebidos</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDVDnZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
    authDomain: "vendedor-html.firebaseapp.com",
    databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
    projectId: "vendedor-html",
    storageBucket: "vendedor-html.firebasestorage.app",
    messagingSenderId: "649120787576",
    appId: "1:649120787576:web:7967250e4f0175b5d9518d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

    const pedidosRef = ref(db, "pedidos");

onValue(pedidosRef, (snapshot) => {

    const dados = snapshot.val();

    if (!dados) {
        document.getElementById("pedidos").innerHTML =
        "<p>Nenhum pedido encontrado.</p>";
        return;
    }

    let html = "";

    Object.keys(dados).reverse().forEach(id => {

        const pedido = dados[id];

        html += `
        <div class="pedido">
            <h3>Cliente: ${pedido.cliente}</h3>

            <p><strong>Telefone:</strong> ${pedido.telefone}</p>

            <p><strong>Endereço:</strong> ${pedido.endereco}</p>

            <p class="status">
                Status: ${pedido.status}
            </p>

            <h4>Itens:</h4>
        `;

        if (pedido.itens) {

            pedido.itens.forEach(item => {

                html += `
                <div class="item">
                    ${item.nome} - R$ ${Number(item.preco).toFixed(2)}
                </div>
                `;
            });
        }

        html += `</div>`;
    });

    document.getElementById("pedidos").innerHTML = html;

});

</script>

</body>
</html>
