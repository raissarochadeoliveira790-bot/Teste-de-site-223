<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5f5f5}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* PRODUTOS */
.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

/* CARRINHO */
.carrinho{
position:fixed;
right:-100%;
top:0;
width:380px;
height:100%;
background:#fff;
transition:.3s;
padding:15px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
gap:10px;
}

.item img{width:40px;height:40px}

.qty-btn{
padding:2px 6px;
border:none;
cursor:pointer;
}

/* FORM */
input, select{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* QTD */
.qtd-box{
display:flex;
gap:5px;
justify-content:center;
align-items:center;
margin-top:5px;
}

.qtd-box input{
width:50px;
text-align:center;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
padding:20px;
}

#modal div{
background:#fff;
padding:20px;
border-radius:10px;
max-width:500px;
width:100%;
}

#modal img{width:100%;height:200px;object-fit:contain;margin-bottom:10px}
</style>
</head>

<body>

<header class="topo">
<h2>Xaréu Embalagens</h2>
<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒 <span id="badgeCarrinho">0</span>
</div>
</header>

<!-- PRODUTOS -->
<section class="produtos">

<!-- 1 -->
<div class="card">
<img src="deoline-lava-roupas-5l.jpg" onclick="abrirModal(0)">
<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>

<div class="qtd-box">
<button onclick="menos('q1')">-</button>
<input id="q1" type="number" value="1" min="1">
<button onclick="mais('q1')">+</button>
</div>

<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg','q1')">Adicionar</button>
</div>

<!-- 2 -->
<div class="card">
<img src="alvejantedeoline.png" onclick="abrirModal(1)">
<h3>Alvejante 5L</h3>
<p>R$ 40,00</p>

<div class="qtd-box">
<button onclick="menos('q2')">-</button>
<input id="q2" type="number" value="1" min="1">
<button onclick="mais('q2')">+</button>
</div>

<button class="btn" onclick="add('Alvejante 5L',40,'alvejantedeoline.png','q2')">Adicionar</button>
</div>

<!-- 3 -->
<div class="card">
<img src="deoline-lava-loucas-500ml.jpg" onclick="abrirModal(2)">
<h3>Lava-Louças 500ml</h3>
<p>R$ 3,00</p>

<div class="qtd-box">
<button onclick="menos('q3')">-</button>
<input id="q3" type="number" value="1" min="1">
<button onclick="mais('q3')">+</button>
</div>

<button class="btn" onclick="add('Lava-Louças 500ml',3,'deoline-lava-loucas-500ml.jpg','q3')">Adicionar</button>
</div>

<!-- 4 -->
<div class="card">
<img src="deoline-limpainox.png" onclick="abrirModal(3)">
<h3>Limpa Inox</h3>
<p>R$ 12,80</p>

<div class="qtd-box">
<button onclick="menos('q4')">-</button>
<input id="q4" type="number" value="1" min="1">
<button onclick="mais('q4')">+</button>
</div>

<button class="btn" onclick="add('Limpa Inox',12.8,'deoline-limpainox.png','q4')">Adicionar</button>
</div>

<!-- 5 -->
<div class="card">
<img src="deoline-limpaaluminio.png" onclick="abrirModal(4)">
<h3>Limpa Alumínio</h3>
<p>R$ 8,00</p>

<div class="qtd-box">
<button onclick="menos('q5')">-</button>
<input id="q5" type="number" value="1" min="1">
<button onclick="mais('q5')">+</button>
</div>

<button class="btn" onclick="add('Limpa Alumínio',8,'deoline-limpaaluminio.png','q5')">Adicionar</button>
</div>

<!-- 6 -->
<div class="card">
<img src="limparejunte.png" onclick="abrirModal(5)">
<h3>Limpa Rejunte</h3>
<p>R$ 11,85</p>

<div class="qtd-box">
<button onclick="menos('q6')">-</button>
<input id="q6" type="number" value="1" min="1">
<button onclick="mais('q6')">+</button>
</div>

<button class="btn" onclick="add('Limpa Rejunte',11.85,'limparejunte.png','q6')">Adicionar</button>
</div>

</section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">

<h3>Carrinho</h3>
<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<h3>Dados do Cliente</h3>

<input id="nome" placeholder="Nome completo">
<input id="telefone" placeholder="Telefone">

<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<h3>Pagamento</h3>
<select id="pagamento" onchange="trocoCheck()">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão de Débito</option>
<option>Cartão de Crédito</option>
</select>

<input id="troco" placeholder="Troco para" style="display:none">

<button class="btn" onclick="finalizar()">Finalizar Pedido</button>
</div>

<!-- MODAL -->
<div id="modal" onclick="fecharModal()">
<div onclick="event.stopPropagation()">
<h3 id="titulo"></h3>
<img id="img">
<p id="desc"></p>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
authDomain: "vendedor-html.firebaseapp.com",
databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
projectId: "vendedor-html",
storageBucket: "vendedor-html.appspot.com",
messagingSenderId: "649120787576",
appId: "1:649120787576:web:7967250e4f0175b5d9518d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = [];

/* ADD COM QUANTIDADE */
window.add = function(nome, preco, img, id){
let qtd = parseInt(document.getElementById(id).value || 1);

let item = carrinho.find(i=>i.nome===nome);

if(item) item.qtd += qtd;
else carrinho.push({nome, preco, img, qtd});

render();
}

/* RENDER CARRINHO */
function render(){
let html = "";
let total = 0;
let qtdTotal = 0;

carrinho.forEach((i,index)=>{
total += i.preco*i.qtd;
qtdTotal += i.qtd;

html += `
<div class="item">
<img src="${i.img}">
<div style="flex:1">${i.nome}</div>

<button onclick="menos(${index})">-</button>
${i.qtd}
<button onclick="mais(${index})">+</button>

<button onclick="remover(${index})">🗑</button>
</div>`;
});

lista.innerHTML = html;
totalEl.innerText = total.toFixed(2);
badgeCarrinho.innerText = qtdTotal;
}

/* CONTROLES */
window.mais = i => {carrinho[i].qtd++;render();}
window.menos = i => {if(carrinho[i].qtd>1)carrinho[i].qtd--;render();}
window.remover = i => {carrinho.splice(i,1);render();}

/* FINALIZAR */
window.finalizar = async () => {

if(carrinho.length===0) return alert("Carrinho vazio");

let pedido = {
nome:nome.value,
telefone:telefone.value,
cep:cep.value,
rua:rua.value,
numero:numero.value,
bairro:bairro.value,
cidade:cidade.value,
estado:estado.value,
pagamento:pagamento.value,
troco:troco.value || "",
itens:carrinho,
total:carrinho.reduce((t,i)=>t+i.preco*i.qtd,0),
status:"Pendente",
data:new Date().toLocaleString()
};

await push(ref(db,"pedidos"),pedido);

alert("Pedido enviado com sucesso!");

carrinho=[];
render();
}

/* CEP VIA CEP */
window.buscarCEP = async () => {
let cepValue = cep.value.replace(/\D/g,'');

if(cepValue.length !== 8) return;

let r = await fetch(`https://viacep.com.br/ws/${cepValue}/json/`);
let d = await r.json();

if(d.erro) return alert("CEP inválido");

rua.value=d.logradouro;
bairro.value=d.bairro;
cidade.value=d.localidade;
estado.value=d.uf;
}

/* TROCO */
window.trocoCheck = () => {
troco.style.display = pagamento.value==="Dinheiro" ? "block":"none";
}

/* ELEMENTOS */
const lista=document.getElementById("lista");
const totalEl=document.getElementById("total");
const badgeCarrinho=document.getElementById("badgeCarrinho");
const carrinhoEl=document.getElementById("carrinho");
const nome=document.getElementById("nome");
const telefone=document.getElementById("telefone");
const cep=document.getElementById("cep");
const rua=document.getElementById("rua");
const numero=document.getElementById("numero");
const bairro=document.getElementById("bairro");
const cidade=document.getElementById("cidade");
const estado=document.getElementById("estado");
const pagamento=document.getElementById("pagamento");
const troco=document.getElementById("troco");

/* ABRIR CARRINHO */
window.abrirCarrinho=()=>carrinhoEl.classList.add("ativo");
</script>

</body>
</html>
