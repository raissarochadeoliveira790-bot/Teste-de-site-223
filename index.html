<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
position:relative;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

.qtd-box{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
margin-top:8px;
}

.qtd-btn{
padding:5px 10px;
border:none;
cursor:pointer;
background:#ddd;
border-radius:5px;
}

input.qtd{
width:40px;
text-align:center;
padding:5px;
}

.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.voltar{
font-size:20px;
cursor:pointer;
margin-bottom:10px;
}

.item-carrinho{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
gap:10px;
}

.item-carrinho img{
width:40px;
height:40px;
object-fit:contain;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">

<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒 <span id="badgeCarrinho">0</span>
</div>
</header>

<section class="produtos">

<!-- PRODUTO 1 -->
<div class="card">
<img src="deoline-lava-roupas-5l.jpg"
onclick="descricao('Lava-Roupas 5L','Lava roupas de alta eficiência.','deoline-lava-roupas-5l.jpg')">

<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q1')">-</button>
<input id="q1" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q1')">+</button>
</div>

<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg','q1')">Adicionar</button>
</div>

<!-- PRODUTO 2 -->
<div class="card">
<img src="deoline-lava-loucas-500ml.jpg"
onclick="descricao('Lava-Louças 500ml','Remove gorduras e sujeiras.','deoline-lava-loucas-500ml.jpg')">

<h3>Lava-Louças 500ml</h3>
<p>R$ 3,00</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q2')">-</button>
<input id="q2" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q2')">+</button>
</div>

<button class="btn" onclick="add('Lava-Louças 500ml',3,'deoline-lava-loucas-500ml.jpg','q2')">Adicionar</button>
</div>

<!-- PRODUTO 3 -->
<div class="card">
<img src="alvejantedeoline.png"
onclick="descricao('Alvejante 5L','Alvejante para limpeza pesada.','alvejantedeoline.png')">

<h3>Alvejante 5L</h3>
<p>R$ 40,00</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q3')">-</button>
<input id="q3" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q3')">+</button>
</div>

<button class="btn" onclick="add('Alvejante 5L',40,'alvejantedeoline.png','q3')">Adicionar</button>
</div>

<!-- PRODUTO 4 -->
<div class="card">
<img src="deoline-limpainox.png"
onclick="descricao('Limpa Inox 750ml','Brilho para inox.','deoline-limpainox.png')">

<h3>Limpa Inox 750ml</h3>
<p>R$ 12,80</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q4')">-</button>
<input id="q4" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q4')">+</button>
</div>

<button class="btn" onclick="add('Limpa Inox 750ml',12.8,'deoline-limpainox.png','q4')">Adicionar</button>
</div>

<!-- PRODUTO 5 -->
<div class="card">
<img src="deoline-limpaaluminio.png"
onclick="descricao('Limpa Alumínio','Remove sujeiras.','deoline-limpaaluminio.png')">

<h3>Limpa Alumínio</h3>
<p>R$ 8,00</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q5')">-</button>
<input id="q5" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q5')">+</button>
</div>

<button class="btn" onclick="add('Limpa Alumínio',8,'deoline-limpaaluminio.png','q5')">Adicionar</button>
</div>

<!-- PRODUTO 6 -->
<div class="card">
<img src="limparejunte.png"
onclick="descricao('Limpa Rejunte','Limpeza pesada.','limparejunte.png')">

<h3>Limpa Rejunte</h3>
<p>R$ 11,85</p>

<div class="qtd-box">
<button class="qtd-btn" onclick="menosQtd('q6')">-</button>
<input id="q6" class="qtd" value="1">
<button class="qtd-btn" onclick="maisQtd('q6')">+</button>
</div>

<button class="btn" onclick="add('Limpa Rejunte',11.85,'limparejunte.png','q6')">Adicionar</button>
</div>

</section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<div class="voltar" onclick="fecharCarrinho()">⬅ Voltar</div>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0.00</span></h3>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:9999;">
<div style="background:#fff;padding:20px;border-radius:10px;max-width:500px;width:90%;text-align:center;">
<h2 id="tituloProduto"></h2>
<img id="imgProduto" style="width:100%;max-height:250px;object-fit:contain;">
<p id="textoProduto"></p>
<button onclick="fecharModal()" class="btn">Fechar</button>
</div>
</div>

<script type="module">

let carrinho = [];

window.add = function(nome,preco,img,id){

let qtd = parseInt(document.getElementById(id).value);

let item = carrinho.find(p=>p.nome===nome);

if(item){
item.qtd += qtd;
}else{
carrinho.push({nome,preco,img,qtd:qtd});
}

render();
}

window.maisQtd = function(id){
document.getElementById(id).value++;
}

window.menosQtd = function(id){
let el = document.getElementById(id);
if(el.value > 1) el.value--;
}

function render(){

let total = 0;
let qtdTotal = 0;
let html = "";

carrinho.forEach(i=>{
total += i.preco * i.qtd;
qtdTotal += i.qtd;

html += `
<div class="item-carrinho">
<img src="${i.img}">
<div style="flex:1">
<strong>${i.nome}</strong><br>
R$ ${i.preco}
</div>
<strong>${i.qtd}</strong>
</div>
`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("badgeCarrinho").innerText = qtdTotal;
}

window.abrirCarrinho=()=>document.getElementById("carrinho").classList.add("ativo");
window.fecharCarrinho=()=>document.getElementById("carrinho").classList.remove("ativo");

window.descricao = function(nome,texto,img){
document.getElementById("tituloProduto").innerText = nome;
document.getElementById("textoProduto").innerText = texto;
document.getElementById("imgProduto").src = img;
document.getElementById("modal").style.display = "flex";
}

window.fecharModal = function(){
document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
