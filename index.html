<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* PRODUTOS */
.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.qtd-box{
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
}

.qtd-btn{
padding:5px 10px;
border:none;
cursor:pointer;
background:#ddd;
border-radius:5px;
}

input.qtd{
width:40px;
text-align:center;
}

/* CARRINHO */
.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.voltar{
font-size:20px;
cursor:pointer;
margin-bottom:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
gap:10px;
}

.item img{
width:40px;
height:40px;
object-fit:contain;
}

.qtd-mini button{
padding:3px 8px;
border:none;
background:#ddd;
cursor:pointer;
}

.remove{
background:red;
color:#fff;
border:none;
padding:4px 6px;
border-radius:5px;
cursor:pointer;
}

/* FORM */
input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

/* MODAL BONITO */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

#modal div{
background:#fff;
padding:20px;
border-radius:12px;
max-width:520px;
width:100%;
max-height:80vh;
overflow-y:auto;
text-align:left;
}

#modal img{
width:100%;
max-height:250px;
object-fit:contain;
margin-bottom:10px;
border-radius:8px;
}

/* DESCRIÇÃO BONITA */
.desc-titulo{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
color:#00a651;
}

.desc-sub{
font-size:14px;
color:#555;
margin-bottom:15px;
}

.desc-bloco{
margin-top:10px;
padding:10px;
background:#f7f7f7;
border-radius:8px;
}

#textoProduto ul{
margin-left:18px;
margin-top:8px;
}

#textoProduto li{
margin-bottom:5px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">

<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒 <span id="badgeCarrinho">0</span>
</div>
</header>

<section class="produtos">

<!-- PRODUTO 1 -->
<div class="card">
<img src="deoline-lava-roupas-5l.jpg"
onclick="descricao(
'Lava-Roupas 5L',
`
<div class='desc-titulo'>🧼 Lava-Roupas 5L</div>
<div class='desc-sub'>Limpeza profunda com alto rendimento.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Remove sujeiras difíceis</li>
<li>Não agride tecidos</li>
<li>Fórmula concentrada</li>
</ul>
</div>
`,
'deoline-lava-roupas-5l.jpg'
)">

<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>

<div class="qtd-box">
<button onclick="menosQtd('q1')" class="qtd-btn">-</button>
<input id="q1" class="qtd" value="1">
<button onclick="maisQtd('q1')" class="qtd-btn">+</button>
</div>

<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg','q1')">Adicionar</button>
</div>

<!-- PRODUTO 2 -->
<div class="card">
<img src="alvejantedeoline.png"
onclick="descricao(
'Alvejante 5L',
`
<div class='desc-titulo'>🧴 Alvejante 5L</div>
<div class='desc-sub'>Limpeza pesada e eficiência máxima.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Remove manchas difíceis</li>
<li>Alto poder de limpeza</li>
<li>Uso doméstico e profissional</li>
</ul>
</div>
`,
'alvejantedeoline.png'
)">

<h3>Alvejante 5L</h3>
<p>R$ 40,00</p>
</div>

<!-- PRODUTO 3 -->
<div class="card">
<img src="deoline-lava-loucas-500ml.jpg"
onclick="descricao(
'Lava-Louças 500ml',
`
<div class='desc-titulo'>🍽️ Lava-Louças 500ml</div>
<div class='desc-sub'>Remove gordura com facilidade.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Alto poder desengordurante</li>
<li>Rende bastante</li>
</ul>
</div>
`,
'deoline-lava-loucas-500ml.jpg'
)">

<h3>Lava-Louças 500ml</h3>
<p>R$ 3,00</p>
</div>

<!-- PRODUTO 4 -->
<div class="card">
<img src="deoline-limpainox.png"
onclick="descricao(
'Limpa Inox',
`
<div class='desc-titulo'>✨ Limpa Inox</div>
<div class='desc-sub'>Brilho e proteção para inox.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Remove marcas e manchas</li>
<li>Brilho instantâneo</li>
</ul>
</div>
`,
'deoline-limpainox.png'
)">

<h3>Limpa Inox</h3>
<p>R$ 12,80</p>
</div>

<!-- PRODUTO 5 -->
<div class="card">
<img src="deoline-limpaaluminio.png"
onclick="descricao(
'Limpa Alumínio',
`
<div class='desc-titulo'>🥘 Limpa Alumínio</div>
<div class='desc-sub'>Limpeza profunda e rápida.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Remove gordura pesada</li>
<li>Brilho imediato</li>
</ul>
</div>
`,
'deoline-limpaaluminio.png'
)">

<h3>Limpa Alumínio</h3>
<p>R$ 8,00</p>
</div>

<!-- PRODUTO 6 -->
<div class="card">
<img src="limparejunte.png"
onclick="descricao(
'Limpa Rejunte',
`
<div class='desc-titulo'>🧽 Limpa Rejunte</div>
<div class='desc-sub'>Limpeza profunda de rejuntes.</div>

<div class='desc-bloco'>
<strong>✨ Benefícios:</strong>
<ul>
<li>Remove sujeiras impregnadas</li>
<li>Recupera cor original</li>
</ul>
</div>
`,
'limparejunte.png'
)">

<h3>Limpa Rejunte</h3>
<p>R$ 11,85</p>
</div>

</section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<div class="voltar" onclick="fecharCarrinho()">⬅ Voltar</div>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0.00</span></h3>

<hr>

<h3>Dados do Cliente</h3>
<input id="nome">
<input id="telefone">
<input id="cep">
<input id="endereco">

<select id="pagamento">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Boleto</option>
</select>

<button class="btn" onclick="finalizar()" style="background:#0066ff">
Finalizar Pedido
</button>
</div>

<!-- MODAL -->
<div id="modal" onclick="fecharModal()">
<div onclick="event.stopPropagation()">
<h2 id="tituloProduto"></h2>
<img id="imgProduto">
<p id="textoProduto"></p>
<br>
<button class="btn" onclick="fecharModal()">Fechar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"x",
authDomain:"x",
databaseURL:"https://vendedor-html-default-rtdb.firebaseio.com",
projectId:"vendedor-html"
});

const db = getDatabase(app);

let carrinho = [];

window.add = function(nome,preco,img,id){
let qtd = parseInt(document.getElementById(id).value);
let item = carrinho.find(p=>p.nome===nome);
if(item) item.qtd += qtd;
else carrinho.push({nome,preco,img,qtd});
render();
}

window.maisQtd = id => document.getElementById(id).value++;
window.menosQtd = id => {let el=document.getElementById(id); if(el.value>1) el.value--;};

window.remover = nome => {
carrinho = carrinho.filter(p=>p.nome!==nome);
render();
}

window.aumentar = nome => {
let i = carrinho.find(p=>p.nome===nome);
i.qtd++;
render();
}

window.diminuir = nome => {
let i = carrinho.find(p=>p.nome===nome);
i.qtd--;
if(i.qtd<=0) carrinho = carrinho.filter(p=>p.nome!==nome);
render();
}

function render(){
let total=0,qtd=0,html="";
carrinho.forEach(i=>{
total += i.preco*i.qtd;
qtd += i.qtd;
html += `<div class="item">
<img src="${i.img}">
<div style="flex:1">
<strong>${i.nome}</strong><br>
R$ ${i.preco.toFixed(2)}
</div>
<div class="qtd-mini">
<button onclick="diminuir('${i.nome}')">-</button>
<strong>${i.qtd}</strong>
<button onclick="aumentar('${i.nome}')">+</button>
</div>
<button class="remove" onclick="remover('${i.nome}')">X</button>
</div>`;
});
document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("badgeCarrinho").innerText = qtd;
}

window.finalizar = function(){
if(carrinho.length==0){alert("Carrinho vazio");return;}

let pedido = {
id:Date.now(),
nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value,
pagamento:pagamento.value,
status:"Pendente",
itens:carrinho,
total:carrinho.reduce((t,i)=>t+i.preco*i.qtd,0)
};

push(ref(db,"pedidos"),pedido).then(()=>{
alert("Pedido enviado!");
carrinho=[];
render();
nome.value=telefone.value=cep.value=endereco.value=pagamento.value="";
fecharCarrinho();
});
}

window.descricao = function(n,t,i){
tituloProduto.innerText=n;
textoProduto.innerHTML=t;
imgProduto.src=i;
modal.style.display="flex";
}

window.fecharModal = ()=>modal.style.display="none";
window.abrirCarrinho = ()=>document.getElementById("carrinho").classList.add("ativo");
window.fecharCarrinho = ()=>document.getElementById("carrinho").classList.remove("ativo");
</script>

</body>
</html>
