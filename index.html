<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f5f5;}

.topo{
display:flex;
justify-content:space-between;
padding:10px 20px;
background:#fff;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
}

.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
cursor:pointer;
}

.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
}

.carrinho.ativo{right:0;}

.voltar{
font-size:20px;
cursor:pointer;
margin-bottom:10px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">

<div class="carrinho-icone" onclick="abrirCarrinho()">🛒</div>
</header>

<section class="produtos">

<div class="card">
<img src="deoline-lava-roupas-5l.jpg">
<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>
<button class="btn" onclick="add('Lava-Roupas',51,'deoline-lava-roupas-5l.jpg')">Adicionar</button>
</div>

<div class="card">
<img src="deoline-lava-loucas-500ml.jpg">
<h3>Lava-Louças</h3>
<p>R$ 3,00</p>
<button class="btn" onclick="add('Lava-Louças',3,'deoline-lava-loucas-500ml.jpg')">Adicionar</button>
</div>

<div class="card">
<img src="alvejantedeoline.png">
<h3>Alvejante</h3>
<p>R$ 40,00</p>
<button class="btn" onclick="add('Alvejante',40,'alvejantedeoline.png')">Adicionar</button>
</div>

<div class="card">
<img src="deoline-limpainox.png">
<h3>Limpa Inox</h3>
<p>R$ 12,80</p>
<button class="btn" onclick="add('Limpa Inox',12.8,'deoline-limpainox.png')">Adicionar</button>
</div>

</section>

<div class="carrinho" id="carrinho">
<div class="voltar" onclick="fecharCarrinho()">⬅ Voltar</div>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<button onclick="finalizar()" style="width:100%;padding:10px;background:#0066ff;color:#fff;border:none;">
Finalizar Pedido
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "vendedor-html.firebaseapp.com",
  databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com/",
  projectId: "vendedor-html",
  appId: "SEU_APP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = [];

window.add = function(nome,preco,img){

let item = carrinho.find(p=>p.nome===nome);

if(item) item.qtd++;
else carrinho.push({nome,preco,img,qtd:1});

render();
}

function render(){

let total=0;
let html="";

carrinho.forEach(i=>{
total += i.preco*i.qtd;

html += `
<div>
<img src="${i.img}" width="40">
${i.nome} x${i.qtd}
</div>`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
}

window.finalizar = function(){

if(carrinho.length === 0) return;

let pedido = {
id: Date.now(),
status: "Pendente",
itens: carrinho,
total: carrinho.reduce((t,i)=>t+i.preco*i.qtd,0)
};

push(ref(db,"pedidos"), pedido);

alert("Pedido enviado!");

carrinho = [];
render();
}

window.abrirCarrinho = function(){
document.getElementById("carrinho").classList.add("ativo");
}

window.fecharCarrinho = function(){
document.getElementById("carrinho").classList.remove("ativo");
}

</script>

</body>
</html>
