<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* PRODUTOS */
.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.qtd-box{
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
}

.qtd-box button{
padding:5px 10px;
border:none;
cursor:pointer;
background:#ddd;
border-radius:5px;
}

input.qtd{
width:40px;
text-align:center;
}

/* CARRINHO */
.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
gap:10px;
}

.item img{
width:40px;
height:40px;
object-fit:contain;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

#modal div{
background:#fff;
padding:20px;
border-radius:12px;
max-width:520px;
width:100%;
text-align:left;
}

#modal img{
width:100%;
max-height:250px;
object-fit:contain;
margin-bottom:10px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">
<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒 <span id="badgeCarrinho">0</span>
</div>
</header>

<section class="produtos">

<!-- PRODUTO 1 -->
<div class="card">
<img src="deoline-lava-roupas-5l.jpg"
onclick="abrirModal('Lava-Roupas 5L','Limpeza profunda com alto rendimento','deoline-lava-roupas-5l.jpg')">

<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>

<div class="qtd-box">
<button onclick="menos('q1')">-</button>
<input id="q1" class="qtd" value="1">
<button onclick="mais('q1')">+</button>
</div>

<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg','q1')">Adicionar</button>
</div>

<!-- PRODUTO 2 -->
<div class="card">
<img src="alvejantedeoline.png"
onclick="abrirModal('Alvejante 5L','Limpeza pesada e eficiente','alvejantedeoline.png')">

<h3>Alvejante 5L</h3>
<p>R$ 40,00</p>

<div class="qtd-box">
<button onclick="menos('q2')">-</button>
<input id="q2" class="qtd" value="1">
<button onclick="mais('q2')">+</button>
</div>

<button class="btn" onclick="add('Alvejante 5L',40,'alvejantedeoline.png','q2')">Adicionar</button>
</div>

<!-- PRODUTO 3 -->
<div class="card">
<img src="deoline-lava-loucas-500ml.jpg"
onclick="abrirModal('Lava-Louças 500ml','Remove gordura facilmente','deoline-lava-loucas-500ml.jpg')">

<h3>Lava-Louças 500ml</h3>
<p>R$ 3,00</p>

<div class="qtd-box">
<button onclick="menos('q3')">-</button>
<input id="q3" class="qtd" value="1">
<button onclick="mais('q3')">+</button>
</div>

<button class="btn" onclick="add('Lava-Louças 500ml',3,'deoline-lava-loucas-500ml.jpg','q3')">Adicionar</button>
</div>

<!-- PRODUTO 4 -->
<div class="card">
<img src="deoline-limpainox.png"
onclick="abrirModal('Limpa Inox','Brilho instantâneo','deoline-limpainox.png')">

<h3>Limpa Inox</h3>
<p>R$ 12,80</p>

<div class="qtd-box">
<button onclick="menos('q4')">-</button>
<input id="q4" class="qtd" value="1">
<button onclick="mais('q4')">+</button>
</div>

<button class="btn" onclick="add('Limpa Inox',12.8,'deoline-limpainox.png','q4')">Adicionar</button>
</div>

<!-- PRODUTO 5 -->
<div class="card">
<img src="deoline-limpaaluminio.png"
onclick="abrirModal('Limpa Alumínio','Limpeza rápida e eficaz','deoline-limpaaluminio.png')">

<h3>Limpa Alumínio</h3>
<p>R$ 8,00</p>

<div class="qtd-box">
<button onclick="menos('q5')">-</button>
<input id="q5" class="qtd" value="1">
<button onclick="mais('q5')">+</button>
</div>

<button class="btn" onclick="add('Limpa Alumínio',8,'deoline-limpaaluminio.png','q5')">Adicionar</button>
</div>

<!-- PRODUTO 6 -->
<div class="card">
<img src="limparejunte.png"
onclick="abrirModal('Limpa Rejunte','Remove sujeiras profundas','limparejunte.png')">

<h3>Limpa Rejunte</h3>
<p>R$ 11,85</p>

<div class="qtd-box">
<button onclick="menos('q6')">-</button>
<input id="q6" class="qtd" value="1">
<button onclick="mais('q6')">+</button>
</div>

<button class="btn" onclick="add('Limpa Rejunte',11.85,'limparejunte.png','q6')">Adicionar</button>
</div>

</section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<h3>Carrinho</h3>
<div id="lista"></div>
<h3>Total: R$ <span id="total">0.00</span></h3>

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<button class="btn" onclick="finalizar()">Finalizar Pedido</button>
</div>

<!-- MODAL -->
<div id="modal" onclick="fecharModal()">
<div onclick="event.stopPropagation()">
<h2 id="titulo"></h2>
<img id="img">
<p id="texto"></p>
<button class="btn" onclick="fecharModal()">Fechar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
authDomain: "vendedor-html.firebaseapp.com",
databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
projectId: "vendedor-html",
storageBucket: "vendedor-html.appspot.com",
messagingSenderId: "649120787576",
appId: "1:649120787576:web:7967250e4f0175b5d9518d",
measurementId: "G-R3BQKGNRQ6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = [];

window.add = function(nome, preco, img, id){
let qtd = parseInt(document.getElementById(id).value);

let item = carrinho.find(i => i.nome === nome);
if(item) item.qtd += qtd;
else carrinho.push({nome, preco, img, qtd});

render();
}

function render(){
let html = "";
let total = 0;
let qtdTotal = 0;

carrinho.forEach(i=>{
total += i.preco * i.qtd;
qtdTotal += i.qtd;

html += `
<div class="item">
<img src="${i.img}">
<div style="flex:1">${i.nome}</div>
<div>${i.qtd}</div>
</div>`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("badgeCarrinho").innerText = qtdTotal;
}

window.finalizar = function(){
if(carrinho.length === 0) return alert("Carrinho vazio");

let pedido = {
id: Date.now(),
nome: nome.value,
telefone: telefone.value,
itens: carrinho,
total: carrinho.reduce((t,i)=>t+i.preco*i.qtd,0),
status: "Pendente"
};

push(ref(db,"pedidos"), pedido)
.then(()=>{
alert("Pedido enviado!");
carrinho = [];
render();
});
}

window.mais = id => document.getElementById(id).value++;
window.menos = id => {
let el = document.getElementById(id);
if(el.value > 1) el.value--;
}

window.abrirCarrinho = () => document.getElementById("carrinho").classList.add("ativo");

window.abrirModal = (t,txt,img) => {
document.getElementById("titulo").innerText = t;
document.getElementById("texto").innerText = txt;
document.getElementById("img").src = img;
document.getElementById("modal").style.display = "flex";
}

window.fecharModal = () => {
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
