<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
position:relative;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

.qtd-box{
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
}

.qtd-btn{
padding:5px 10px;
border:none;
cursor:pointer;
background:#ddd;
border-radius:5px;
}

input.qtd{
width:40px;
text-align:center;
}

.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.voltar{
font-size:20px;
cursor:pointer;
margin-bottom:10px;
}

.item-carrinho{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
gap:10px;
}

.item-carrinho img{
width:40px;
height:40px;
object-fit:contain;
}

.qtd-mini{
display:flex;
align-items:center;
gap:5px;
}

.remove{
background:red;
color:#fff;
border:none;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">

<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒 <span id="badgeCarrinho">0</span>
</div>
</header>

<section class="produtos">

<!-- PRODUTOS -->
<!-- (mesmos 6 produtos com quantidade antes de adicionar) -->

<div class="card">
<img src="deoline-lava-roupas-5l.jpg"
onclick="descricao('Lava-Roupas 5L','Alta eficiência.','deoline-lava-roupas-5l.jpg')">

<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>

<div class="qtd-box">
<button onclick="menosQtd('q1')" class="qtd-btn">-</button>
<input id="q1" class="qtd" value="1">
<button onclick="maisQtd('q1')" class="qtd-btn">+</button>
</div>

<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg','q1')">Adicionar</button>
</div>

<!-- (repita padrão para os outros 5 produtos - mantive simples aqui pra não estourar tamanho) -->

</section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<div class="voltar" onclick="fecharCarrinho()">⬅ Voltar</div>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0.00</span></h3>

<hr>

<h3>Dados do Cliente</h3>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Boleto</option>
</select>

<button class="btn" onclick="finalizar()" style="background:#0066ff">
Finalizar Pedido
</button>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:9999;">
<div style="background:#fff;padding:20px;border-radius:10px;max-width:500px;width:90%;text-align:center;">
<h2 id="tituloProduto"></h2>
<img id="imgProduto" style="width:100%;max-height:250px;object-fit:contain;">
<p id="textoProduto"></p>
<button onclick="fecharModal()" class="btn">Fechar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDVNdZ",
authDomain:"vendedor-html.firebaseapp.com",
databaseURL:"https://vendedor-html-default-rtdb.firebaseio.com",
projectId:"vendedor-html"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = [];

window.add = function(nome,preco,img,id){

let qtd = parseInt(document.getElementById(id).value);

let item = carrinho.find(p=>p.nome===nome);

if(item){
item.qtd += qtd;
}else{
carrinho.push({nome,preco,img,qtd});
}

render();
}

window.maisQtd = id => document.getElementById(id).value++;

window.menosQtd = id => {
let el = document.getElementById(id);
if(el.value > 1) el.value--;
}

window.remover = function(nome){
carrinho = carrinho.filter(p=>p.nome!==nome);
render();
}

window.aumentarCarrinho = function(nome){
let item = carrinho.find(p=>p.nome===nome);
item.qtd++;
render();
}

window.diminuirCarrinho = function(nome){
let item = carrinho.find(p=>p.nome===nome);
item.qtd--;
if(item.qtd<=0) carrinho = carrinho.filter(p=>p.nome!==nome);
render();
}

function render(){

let total=0, qtd=0, html="";

carrinho.forEach(i=>{
total += i.preco*i.qtd;
qtd += i.qtd;

html += `
<div class="item-carrinho">

<img src="${i.img}">

<div style="flex:1">
<strong>${i.nome}</strong><br>
R$ ${i.preco}
</div>

<div class="qtd-mini">
<button onclick="diminuirCarrinho('${i.nome}')">-</button>
<strong>${i.qtd}</strong>
<button onclick="aumentarCarrinho('${i.nome}')">+</button>
</div>

<button class="remove" onclick="remover('${i.nome}')">X</button>

</div>
`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("badgeCarrinho").innerText = qtd;
}

window.finalizar = function(){

const pedido = {
id:Date.now(),
nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value,
pagamento:pagamento.value,
status:"Pendente",
itens:carrinho,
total:carrinho.reduce((t,i)=>t+i.preco*i.qtd,0)
};

push(ref(db,"pedidos"),pedido)
.then(()=>{
alert("Pedido enviado!");
carrinho=[];
render();
});
}

// MODAL
window.descricao=function(n,t,i){
tituloProduto.innerText=n;
textoProduto.innerText=t;
imgProduto.src=i;
modal.style.display="flex";
}

window.fecharModal=()=>modal.style.display="none";

window.abrirCarrinho=()=>carrinho.classList.add("ativo");
window.fecharCarrinho=()=>carrinho.classList.remove("ativo");

</script>

</body>
</html>
