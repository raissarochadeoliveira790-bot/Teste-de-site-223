<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaréu Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
position:relative;
}

.carrinho-icone{
font-size:24px;
cursor:pointer;
position:relative;
}

#badgeCarrinho{
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:12px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.produtos{
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

@media(max-width:768px){
.produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
cursor:pointer;
}

.btn{
width:100%;
padding:10px;
background:#00a651;
color:#fff;
border:none;
cursor:pointer;
border-radius:5px;
}

.carrinho{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:#fff;
transition:.3s;
padding:10px;
overflow:auto;
z-index:1000;
}

.carrinho.ativo{right:0;}

.voltar{
font-size:20px;
cursor:pointer;
margin-bottom:10px;
}

.item-carrinho{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
gap:10px;
}

.item-carrinho img{
width:40px;
height:40px;
object-fit:contain;
}

.qtd-btn{
padding:3px 8px;
border:none;
cursor:pointer;
background:#ddd;
border-radius:5px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header class="topo">
<img src="xareu-banner.png" width="120">

<div class="carrinho-icone" onclick="abrirCarrinho()">
🛒
<span id="badgeCarrinho">0</span>
</div>
</header>

<section class="produtos">

<div class="card">
<img src="deoline-lava-roupas-5l.jpg">
<h3>Lava-Roupas 5L</h3>
<p>R$ 51,00</p>
<button class="btn" onclick="add('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg')">Adicionar</button>
</div>

<div class="card">
<img src="deoline-lava-loucas-500ml.jpg">
<h3>Lava-Louças 500ml</h3>
<p>R$ 3,00</p>
<button class="btn" onclick="add('Lava-Louças 500ml',3,'deoline-lava-loucas-500ml.jpg')">Adicionar</button>
</div>

<div class="card">
<img src="alvejantedeoline.png">
<h3>Alvejante 5L</h3>
<p>R$ 40,00</p>
<button class="btn" onclick="add('Alvejante 5L',40,'alvejantedeoline.png')">Adicionar</button>
</div>

<div class="card">
<img src="deoline-limpainox.png">
<h3>Limpa Inox 750ml</h3>
<p>R$ 12,80</p>
<button class="btn" onclick="add('Limpa Inox 750ml',12.8,'deoline-limpainox.png')">Adicionar</button>
</div>

<div class="card">
<img src="deoline-limpaaluminio.png">
<h3>Limpa Alumínio</h3>
<p>R$ 8,00</p>
<button class="btn" onclick="add('Limpa Alumínio',8,'deoline-limpaaluminio.png')">Adicionar</button>
</div>

<div class="card">
<img src="limparejunte.png">
<h3>Limpa Rejunte</h3>
<p>R$ 11,85</p>
<button class="btn" onclick="add('Limpa Rejunte',11.85,'limparejunte.png')">Adicionar</button>
</div>

</section>

<div class="carrinho" id="carrinho">
<div class="voltar" onclick="fecharCarrinho()">⬅ Voltar</div>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0.00</span></h3>

<hr><br>

<input type="text" id="nome" placeholder="Nome Completo">
<input type="text" id="telefone" placeholder="Telefone">
<input type="text" id="cep" placeholder="CEP">
<input type="text" id="endereco" placeholder="Endereço">

<select id="pagamento">
<option value="">Forma de Pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão Débito</option>
<option>Cartão Crédito</option>
<option>Boleto</option>
</select>

<button onclick="finalizar()" class="btn" style="background:#0066ff">Finalizar Pedido</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVNdZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
  authDomain: "vendedor-html.firebaseapp.com",
  databaseURL: "https://vendedor-html-default-rtdb.firebaseio.com",
  projectId: "vendedor-html",
  storageBucket: "vendedor-html.firebasestorage.app",
  messagingSenderId: "649120787576",
  appId: "1:649120787576:web:7967250e4f0175b5d9518d",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = [];

window.add = function(nome,preco,img){
let item = carrinho.find(p=>p.nome===nome);
if(item) item.qtd++;
else carrinho.push({nome,preco,img,qtd:1});
render();
}

window.remover = function(nome){
let item = carrinho.find(p=>p.nome===nome);
if(!item) return;

item.qtd--;
if(item.qtd<=0){
carrinho = carrinho.filter(p=>p.nome!==nome);
}

render();
}

function render(){

let total = 0;
let quantidadeTotal = 0;
let html = "";

carrinho.forEach(i=>{
total += i.preco * i.qtd;
quantidadeTotal += i.qtd;

html += `
<div class="item-carrinho">
<img src="${i.img}">
<div style="flex:1">
<strong>${i.nome}</strong><br>
R$ ${i.preco}
</div>

<button class="qtd-btn" onclick="remover('${i.nome}')">-</button>
<strong>${i.qtd}</strong>
<button class="qtd-btn" onclick="add('${i.nome}',${i.preco},'${i.img}')">+</button>

</div>
`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("badgeCarrinho").innerText = quantidadeTotal;
}

window.finalizar = function(){

if(carrinho.length === 0){
alert("Carrinho vazio!");
return;
}

const pedido = {
id: Date.now(),
nome: nome.value,
telefone: telefone.value,
cep: cep.value,
endereco: endereco.value,
pagamento: pagamento.value,
status: "Pendente",
itens: carrinho,
total: carrinho.reduce((t,i)=>t+i.preco*i.qtd,0)
};

push(ref(db,"pedidos"), pedido)
.then(()=>{
alert("Pedido enviado!");
carrinho = [];
render();
})
.catch(e=>alert(e));

}

window.abrirCarrinho = ()=>document.getElementById("carrinho").classList.add("ativo");
window.fecharCarrinho = ()=>document.getElementById("carrinho").classList.remove("ativo");

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:2000;">
<div style="background:#fff;padding:20px;border-radius:10px;max-width:500px;width:90%;">
<h2 id="tituloProduto"></h2>
<img id="imgProduto" style="width:100%;max-height:250px;object-fit:contain;">
<p id="textoProduto"></p>
<button class="btn" onclick="fecharModal()">Fechar</button>
</div>
</div>
  
</script>

</body>
</html>
