<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{background:#f5f5f5;}

/* HEADER */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#fff;
}

.topo img{width:130px;}

.carrinho-icone{
    position:relative;
    font-size:26px;
    cursor:pointer;
}

#contadorCarrinho{
    position:absolute;
    top:-6px;
    right:-10px;
    background:red;
    color:#fff;
    font-size:12px;
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
}

/* GRID */
.produtos{
    max-width:1200px;
    margin:20px auto;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

@media(max-width:1024px){.produtos{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.produtos{grid-template-columns:repeat(2,1fr);}}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
    padding:8px;
    cursor:pointer;
}

.info{padding:10px;}

.info h2{
    font-size:13px;
    height:34px;
    overflow:hidden;
}

.preco{
    font-size:16px;
    color:#0066ff;
    font-weight:bold;
    margin:8px 0;
}

.btn{
    width:100%;
    padding:10px;
    background:#00a651;
    border:none;
    color:#fff;
    cursor:pointer;
    border-radius:6px;
}

/* CARRINHO */
.carrinho-lateral{
    position:fixed;
    top:0;
    right:-100%;
    width:360px;
    height:100%;
    background:#fff;
    box-shadow:-5px 0 15px rgba(0,0,0,.2);
    padding:15px;
    transition:.3s;
    overflow:auto;
    z-index:9999;
}

.carrinho-lateral.ativo{right:0;}

.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.qtd{
    display:flex;
    gap:8px;
    align-items:center;
    margin-top:6px;
}

.qtd button{
    width:25px;
    height:25px;
    border:none;
    background:#ddd;
    cursor:pointer;
}

.remover{
    background:red;
    color:#fff;
    border:none;
    padding:4px 8px;
    cursor:pointer;
    border-radius:4px;
}

.total{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#00a651;
}

.finalizar{
    width:100%;
    padding:12px;
    background:#0066ff;
    color:#fff;
    border:none;
    margin-top:10px;
}
</style>
</head>

<body>

<header class="topo">
    <img src="xareu-banner.png">
    <div class="carrinho-icone" onclick="abrirCarrinho()">
        🛒 <span id="contadorCarrinho">0</span>
    </div>
</header>

<!-- 🟢 PRODUTOS COMPLETOS -->
<section class="produtos">

    <div class="card">
        <a href="produto.html?prod=lava-roupas">
            <img src="deoline-lava-roupas-5l.jpg">
        </a>
        <div class="info">
            <h2>Lava-Roupas 5L</h2>
            <div class="preco">R$ 51,00</div>
            <button class="btn" onclick="adicionar('Lava-Roupas 5L',51,'deoline-lava-roupas-5l.jpg')">
                Adicionar
            </button>
        </div>
    </div>

    <div class="card">
        <a href="produto.html?prod=lava-loucas">
            <img src="deoline-lava-loucas-500ml.jpg">
        </a>
        <div class="info">
            <h2>Lava-Louças 500ml</h2>
            <div class="preco">R$ 3,00</div>
            <button class="btn" onclick="adicionar('Lava-Louças 500ml',3,'deoline-lava-loucas-500ml.jpg')">
                Adicionar
            </button>
        </div>
    </div>

    <div class="card">
        <a href="produto.html?prod=alvejante">
            <img src="alvejantedeoline.png">
        </a>
        <div class="info">
            <h2>Alvejante 5L</h2>
            <div class="preco">R$ 40,00</div>
            <button class="btn" onclick="adicionar('Alvejante 5L',40,'alvejantedeoline.png')">
                Adicionar
            </button>
        </div>
    </div>

    <div class="card">
        <a href="produto.html?prod=limpa-inox">
            <img src="deoline-limpainox.png">
        </a>
        <div class="info">
            <h2>Limpa Inox 750ml</h2>
            <div class="preco">R$ 12,80</div>
            <button class="btn" onclick="adicionar('Limpa Inox 750ml',12.80,'deoline-limpainox.png')">
                Adicionar
            </button>
        </div>
    </div>

    <div class="card">
        <a href="produto.html?prod=limpa-aluminio">
            <img src="deoline-limpaaluminio.png">
        </a>
        <div class="info">
            <h2>Limpa Alumínio</h2>
            <div class="preco">R$ 8,00</div>
            <button class="btn" onclick="adicionar('Limpa Alumínio',8,'deoline-limpaaluminio.png')">
                Adicionar
            </button>
        </div>
    </div>

    <div class="card">
        <a href="produto.html?prod=limpa-rejunte">
            <img src="limparejunte.png">
        </a>
        <div class="info">
            <h2>Limpa Rejunte</h2>
            <div class="preco">R$ 11,85</div>
            <button class="btn" onclick="adicionar('Limpa Rejunte',11.85,'limparejunte.png')">
                Adicionar
            </button>
        </div>
    </div>

</section>

<!-- 🛒 CARRINHO -->
<div id="carrinhoLateral" class="carrinho-lateral">

<h2>🛒 Carrinho</h2>

<div id="listaCarrinho"></div>

<div class="total">Total: R$ <span id="total">0</span></div>

<button class="finalizar" onclick="finalizarPedido()">
Finalizar Pedido
</button>

</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar(){
localStorage.setItem("carrinho",JSON.stringify(carrinho));
}

function adicionar(nome,preco,img){

let item = carrinho.find(p=>p.nome===nome);

if(item){
item.qtd++;
} else {
carrinho.push({nome,preco,qtd:1,img});
}

atualizar();
abrirCarrinho();
}

function aumentar(nome){
let item = carrinho.find(p=>p.nome===nome);
item.qtd++;
atualizar();
}

function diminuir(nome){
let item = carrinho.find(p=>p.nome===nome);
item.qtd--;
if(item.qtd<=0) carrinho = carrinho.filter(p=>p.nome!==nome);
atualizar();
}

function remover(nome){
carrinho = carrinho.filter(p=>p.nome!==nome);
atualizar();
}

function atualizar(){

salvar();

document.getElementById("contadorCarrinho").innerText =
carrinho.reduce((t,i)=>t+i.qtd,0);

let total=0,html="";

carrinho.forEach(item=>{
total += item.preco*item.qtd;

html += `
<div class="item">
<strong>${item.nome}</strong>

<div class="qtd">
<button onclick="diminuir('${item.nome}')">-</button>
<span>${item.qtd}</span>
<button onclick="aumentar('${item.nome}')">+</button>
<button class="remover" onclick="remover('${item.nome}')">X</button>
</div>

<div>R$ ${(item.preco*item.qtd).toFixed(2)}</div>
</div>`;
});

document.getElementById("listaCarrinho").innerHTML = html;
document.getElementById("total").innerText = total.toFixed(2);
}

function abrirCarrinho(){
document.getElementById("carrinhoLateral").classList.add("ativo");
}

function finalizarPedido(){

if(carrinho.length===0){
alert("Carrinho vazio!");
return;
}

let pedido = {
id: Date.now(),
status: "Pendente",
itens: carrinho,
total: carrinho.reduce((t,i)=>t+i.preco*i.qtd,0)
};

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
pedidos.push(pedido);
localStorage.setItem("pedidos",JSON.stringify(pedidos));

let msg="🛒 NOVO PEDIDO\n\n";

pedido.itens.forEach(i=>{
msg += `• ${i.nome} x${i.qtd} - R$ ${(i.preco*i.qtd).toFixed(2)}\n`;
});

msg += `\nTOTAL: R$ ${pedido.total.toFixed(2)}`;

window.open(`https://wa.me/5544998092717?text=${encodeURIComponent(msg)}`);

carrinho=[];
atualizar();
}

atualizar();

</script>

</body>
</html>
