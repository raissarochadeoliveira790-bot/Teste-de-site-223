<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

/* HEADER */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#fff;
}

.topo img{
    width:130px;
}

.carrinho-icone{
    position:relative;
    font-size:26px;
    cursor:pointer;
}

#contadorCarrinho{
    position:absolute;
    top:-6px;
    right:-10px;
    background:red;
    color:#fff;
    font-size:12px;
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
}

/* GRID PRODUTOS */
.produtos{
    max-width:1200px;
    margin:20px auto;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

@media (max-width:1024px){
    .produtos{grid-template-columns:repeat(3,1fr);}
}

@media (max-width:768px){
    .produtos{grid-template-columns:repeat(2,1fr);}
}

@media (max-width:420px){
    .produtos{grid-template-columns:repeat(2,1fr);}
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
    padding:8px;
}

.info{padding:10px;}

.info h2{
    font-size:13px;
    height:34px;
    overflow:hidden;
}

.preco{
    font-size:16px;
    color:#0066ff;
    font-weight:bold;
    margin:8px 0;
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#00a651;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

/* CARRINHO */
.carrinho-lateral{
    position:fixed;
    top:0;
    right:-100%;
    width:360px;
    height:100%;
    background:#fff;
    box-shadow:-5px 0 15px rgba(0,0,0,.2);
    padding:15px;
    transition:.3s;
    overflow:auto;
    z-index:9999;
}

.carrinho-lateral.ativo{
    right:0;
}

.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.item-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.qtd{
    display:flex;
    gap:8px;
    align-items:center;
    margin-top:6px;
}

.qtd button{
    width:25px;
    height:25px;
    border:none;
    background:#ddd;
    cursor:pointer;
    border-radius:4px;
}

.remover{
    background:red;
    color:#fff;
    border:none;
    padding:4px 8px;
    border-radius:4px;
    cursor:pointer;
}

.total{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#00a651;
}

.finalizar{
    width:100%;
    padding:12px;
    background:#0066ff;
    color:#fff;
    border:none;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header class="topo">
    <img src="xareu-banner.png">

    <div class="carrinho-icone" onclick="abrirCarrinho()">
        🛒
        <span id="contadorCarrinho">0</span>
    </div>
</header>

<section class="produtos">

    <div class="card">
        <img src="deoline-lava-roupas-5l.jpg">
        <div class="info">
            <h2>Lava-Roupas 5L</h2>
            <div class="preco">R$ 51,00</div>
            <button class="btn" onclick="adicionar('Lava-Roupas 5L',51)">Adicionar</button>
        </div>
    </div>

    <div class="card">
        <img src="deoline-lava-loucas-500ml.jpg">
        <div class="info">
            <h2>Lava-Louças 500ml</h2>
            <div class="preco">R$ 3,00</div>
            <button class="btn" onclick="adicionar('Lava-Louças',3)">Adicionar</button>
        </div>
    </div>

</section>

<div id="carrinhoLateral" class="carrinho-lateral">

    <h2>🛒 Carrinho</h2>

    <div id="listaCarrinho"></div>

    <div class="total">Total: R$ <span id="total">0</span></div>

    <button class="finalizar" onclick="finalizarPedido()">
        Finalizar Pedido
    </button>
</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar(){
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function adicionar(nome, preco){

    let item = carrinho.find(p => p.nome === nome);

    if(item){
        item.qtd++;
    } else {
        carrinho.push({nome, preco, qtd:1});
    }

    atualizar();
    abrirCarrinho();
}

function aumentar(nome){
    let item = carrinho.find(p => p.nome === nome);
    item.qtd++;
    atualizar();
}

function diminuir(nome){
    let item = carrinho.find(p => p.nome === nome);

    item.qtd--;

    if(item.qtd <= 0){
        carrinho = carrinho.filter(p => p.nome !== nome);
    }

    atualizar();
}

function remover(nome){
    carrinho = carrinho.filter(p => p.nome !== nome);
    atualizar();
}

function atualizar(){

    salvar();

    document.getElementById("contadorCarrinho").innerText =
        carrinho.reduce((t, i) => t + i.qtd, 0);

    let total = 0;
    let html = "";

    carrinho.forEach(item=>{
        total += item.preco * item.qtd;

        html += `
        <div class="item">
            <div class="item-top">
                <strong>${item.nome}</strong>
                <button class="remover" onclick="remover('${item.nome}')">X</button>
            </div>

            <div class="qtd">
                <button onclick="diminuir('${item.nome}')">-</button>
                <span>${item.qtd}</span>
                <button onclick="aumentar('${item.nome}')">+</button>
            </div>

            <div>R$ ${(item.preco * item.qtd).toFixed(2)}</div>
        </div>`;
    });

    document.getElementById("listaCarrinho").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

function abrirCarrinho(){
    document.getElementById("carrinhoLateral").classList.add("ativo");
}

function finalizarPedido(){

    if(carrinho.length === 0){
        alert("Carrinho vazio!");
        return;
    }

    let mensagem = "🛒 NOVO PEDIDO%0A%0A";
    let total = 0;

    carrinho.forEach(item=>{
        mensagem += `• ${item.nome} x${item.qtd} - R$ ${(item.preco * item.qtd).toFixed(2)}%0A`;
        total += item.preco * item.qtd;
    });

    mensagem += `%0A💰 TOTAL: R$ ${total.toFixed(2)}`;

    let url = `https://wa.me/5544998092717?text=${mensagem}`;

    window.open(url, "_blank");
}

atualizar();

</script>

</body>
</html>
