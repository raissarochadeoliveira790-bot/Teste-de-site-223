<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5f5f5}

/* HEADER */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#fff;
}
.topo img{width:130px}

.carrinho-icone{
    position:relative;
    font-size:26px;
    cursor:pointer;
}
#contadorCarrinho{
    position:absolute;
    top:-6px;
    right:-10px;
    background:red;
    color:#fff;
    font-size:12px;
    width:18px;height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
}

/* PRODUTOS */
.produtos{
    max-width:1200px;
    margin:20px auto;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}
.card img{width:100%;height:250px;object-fit:contain;padding:10px}
.info{padding:10px}
.preco{font-size:20px;color:#0066ff;font-weight:bold;margin:10px 0}
.btn{width:100%;padding:10px;background:#00a651;color:#fff;border:none;border-radius:6px}

/* CARRINHO */
.carrinho-lateral{
    position:fixed;
    top:0;right:-100%;
    width:340px;height:100%;
    background:#fff;
    box-shadow:-5px 0 15px rgba(0,0,0,.2);
    padding:15px;
    transition:.3s;
    overflow:auto;
}
.carrinho-lateral.ativo{right:0}
.item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.total{margin-top:15px;font-size:18px;font-weight:bold;color:#00a651}
.finalizar{width:100%;padding:12px;background:#0066ff;color:#fff;border:none;margin-top:10px}

/* MOBILE */
@media(max-width:768px){
    .produtos{
        grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    }
}
</style>
</head>

<body>

<header class="topo">
    <img src="xareu-banner.png">

    <div class="carrinho-icone" onclick="abrirCarrinho()">
        🛒
        <span id="contadorCarrinho">0</span>
    </div>
</header>

<section class="produtos">

    <div class="card">
        <img src="deoline-lava-roupas-5l.jpg">
        <div class="info">
            <h3>Lava-Roupas 5L</h3>
            <div class="preco">R$ 51,00</div>
            <button class="btn" onclick="adicionar('Lava-Roupas 5L',51)">Adicionar</button>
        </div>
    </div>

    <div class="card">
        <img src="deoline-lava-loucas-500ml.jpg">
        <div class="info">
            <h3>Lava-Louças</h3>
            <div class="preco">R$ 3,00</div>
            <button class="btn" onclick="adicionar('Lava-Louças',3)">Adicionar</button>
        </div>
    </div>

</section>

<!-- CARRINHO -->
<div id="carrinho" class="carrinho-lateral">

    <h2>🛒 Carrinho</h2>

    <div id="lista"></div>

    <div class="total">Total: R$ <span id="total">0</span></div>

    <hr>

    <input id="nome" placeholder="Nome">
    <input id="telefone" placeholder="Telefone">
    <input id="endereco" placeholder="Endereço">

    <select id="pagamento">
        <option>PIX</option>
        <option>Cartão</option>
        <option>Boleto</option>
    </select>

    <button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyDVDnZ-GWHE8_4gLd4zRPTJGuwIMsyIK0Q",
 authDomain:"vendedor-html.firebaseapp.com",
 projectId:"vendedor-html",
 storageBucket:"vendedor-html.firebasestorage.app",
 messagingSenderId:"649120787576",
 appId:"1:649120787576:web:7967250e4f0175b5d9518d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar(){
    localStorage.setItem("carrinho",JSON.stringify(carrinho));
}

function atualizar(){

    salvar();

    document.getElementById("contadorCarrinho").innerText = carrinho.length;

    let total = 0;
    let html = "";

    carrinho.forEach(item=>{
        total += item.preco;
        html += `<div class="item"><span>${item.nome}</span><span>R$ ${item.preco}</span></div>`;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

window.adicionar = function(nome,preco){
    carrinho.push({nome,preco});
    atualizar();
    abrirCarrinho();
}

window.abrirCarrinho = function(){
    document.getElementById("carrinho").classList.add("ativo");
}

window.finalizarPedido = async function(){

    const pedido = {
        cliente:document.getElementById("nome").value,
        telefone:document.getElementById("telefone").value,
        endereco:document.getElementById("endereco").value,
        pagamento:document.getElementById("pagamento").value,
        itens:carrinho,
        total:carrinho.reduce((a,b)=>a+b.preco,0),
        status:"Pendente",
        criadoEm:new Date().toISOString()
    };

    await push(ref(db,"pedidos"),pedido);

    alert("Pedido enviado!");

    carrinho = [];
    salvar();
    atualizar();
}

atualizar();

</script>

</body>
</html>
